name = "slack-sync-bridge"
main = "src/index.ts"
compatibility_date = "2026-05-30"
compatibility_flags = ["nodejs_compat"]

# Producer: fetch() enqueues each event_callback envelope as it arrives.
# Consumer: queue() drains, writes slackRaw, derives + publishes to atproto.
# Both bindings on the same worker = one deploy holds both halves.
#
# Provision the queues first:
#   wrangler queues create slack-events
#   wrangler queues create slack-events-dlq
[[queues.producers]]
binding = "EVENTS"
queue = "slack-events"

[[queues.consumers]]
queue = "slack-events"
max_batch_size = 25
max_batch_timeout = 2
max_retries = 5
dead_letter_queue = "slack-events-dlq"

# D1 cache: dumb mirror of atproto records by (repo, collection, rkey), plus
# private oauth_tokens table (v2). See the proposal's Storage model section.
# Uncomment once the DB is created:
#   wrangler d1 create slack-sync-cache
# [[d1_databases]]
# binding = "CACHE"
# database_name = "slack-sync-cache"
# database_id = "<paste-id-from-create>"

# Secrets (set via `wrangler secret put`):
#   SLACK_SIGNING_SECRET
#   SLACK_BOT_TOKEN
#   BSKY_HANDLE
#   BSKY_APP_PASSWORD     # or v2: BSKY_OAUTH_REFRESH_TOKEN
